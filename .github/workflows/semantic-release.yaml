---
# This workflow uses third party actions and software which
# are governed by separate terms of service, privacy policy,
# and support documentation. Always consider supply chain
# security, the safety & compliance of sources

# This semantic workflow utilises the semantic versioning standard
# to ensure automated, consistent and meaningful version numbers upon
# merging pull request changes into the code base. It is fully customisable
# and can be adjusted to meet specific needs if desired. The actions analyses
# the commits in a Git repository since the last release, and determine the next
# version number based on the types of commits.
# [Semantic release documentation](https://semantic-release.gitbook.io/semantic-release/usage/configuration)
# [Capgemini AXIS version documentation](https://literate-garbanzo-g337mpm.pages.github.io/docs/best-practices/versioning/)
name: "Semantic Release"

on:
  push:
    branches:
      - main

concurrency:
  group: "Semantic Release Main"
  cancel-in-progress: false

permissions:
  contents: write  # to be able to publish a GitHub release
  issues: write  # to be able to comment on released issues
  pull-requests: write  # to be able to comment on released pull requests

jobs:
  check:
    name: prerequisites checks
    runs-on: ubuntu-latest
    outputs:
      has_gh_secrets: ${{ steps.check-gh-key-secret.outputs.declared }}
    steps:
      - name: Check for GitHub Secret availability
        id: check-gh-key-secret
        shell: bash
        run: |
          if [[ ! -z  "${{ secrets.GH_APP_VERSIONING_ID }}" ]] && [[ ! -z  "${{ secrets.GH_APP_VERSIONING_PRIVATE_KEY }}" ]]; then
            echo "All secrets are declared."
            echo "declared=true" >> $GITHUB_OUTPUT;
          else
            echo "One or more secrets are missing."
            exit 1
          fi

  check_version_number:
    name: check version number
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to be able to publish a GitHub release
      issues: write  # to be able to comment on released issues
      pull-requests: write  # to be able to comment on released pull requests
    outputs:
      new_release_published: ${{ steps.semantic_dry.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic_dry.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Get semantic release version
        uses: cycjimmy/semantic-release-action@cb425203a562475bca039ba4dbf90c7f9ac790f4
        id: semantic_dry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dry_run: true
          branches: |
            [
              "+([0-9])?(.{+([0-9]),x}).x",
              "main"
            ]
          extends: |
            conventional-changelog-conventionalcommits
          extra_plugins: |
            @semantic-release/commit-analyzer@9.0.2
            @semantic-release/release-notes-generator@10.0.3
            @semantic-release/github@8.0.7
            @semantic-release/git@10.0.1
            @semantic-release/changelog
            conventional-changelog-conventionalcommits@6.1.0
            @semantic-release/exec

  tag_version:
    name: release
    needs: [check, check_version_number]
    if: |
      needs.check.outputs.has_gh_secrets
      && needs.check_version_number.outputs.new_release_published
      && github.actor != 'nektos/act'
    permissions:
      contents: write  # to be able to publish a GitHub release
      issues: write  # to be able to comment on released issues
      pull-requests: write  # to be able to comment on released pull requests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false  # make sure the release step uses its own credentials
      - name: Get token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a
        id: get_installation_token
        with:
          app_id: ${{ secrets.GH_APP_VERSIONING_ID }}
          # installation_id not needed IF the app is installed on this current repo
          # installation_id: ${{ secrets.GH_APP_VERSIONING_INSTALLATION_ID }}
          private_key: ${{ secrets.GH_APP_VERSIONING_PRIVATE_KEY }}
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@cb425203a562475bca039ba4dbf90c7f9ac790f4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ steps.get_installation_token.outputs.token }}
        with:
          semantic_version: 19
          branches: |
            [
              "+([0-9])?(.{+([0-9]),x}).x",
              "main"
            ]
          extends: |
            conventional-changelog-conventionalcommits
          extra_plugins: |
            @semantic-release/commit-analyzer@9.0.2
            @semantic-release/release-notes-generator@10.0.3
            @semantic-release/github@8.0.7
            @semantic-release/git@10.0.1
            @semantic-release/changelog
            conventional-changelog-conventionalcommits@6.1.0
            @semantic-release/exec

      - name: Changelog version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo ${{ steps.semantic.outputs.new_release_version }}
