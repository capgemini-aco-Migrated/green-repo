---
# PRE-COMMIT: This file should be tailored to the
# requirements of the project team. This file contains
# some generic checks
default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_stages: [pre-commit, manual]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # frozen: v5.0.0
    hooks:
      - id: end-of-file-fixer
        description: Makes sure files end in a newline and only a newline.
      - id: trailing-whitespace
        description: Trims trailing whitespace
      - id: mixed-line-ending
        args: ['--fix=lf']
        description: Forces to replace line ending by the UNIX 'lf' character.
      - id: check-case-conflict
        description: Checks for files that would conflict in case-insensitive filesystems.
      - id: check-merge-conflict
        description: Checks for files that contain merge conflict strings
      # Removed due to conflict with dockers new file system
      # - id: check-executables-have-shebangs
      - id: no-commit-to-branch
        args: [--branch, main]
        description: Protect specific branches from direct checkins.
      - id: detect-private-key
        description: Detects the presence of private keys.
      - id: detect-aws-credentials
        args:
          - "--allow-missing-credentials"
        description: Detects the presence of aws credentials.
  - repo: https://github.com/adrienverge/yamllint
    rev: 81e9f98ffd059efe8aa9c1b1a42e5cce61b640c6  # frozen: v1.35.1
    hooks:
      - id: yamllint
        name: Check yaml files with yamllint
        entry: yamllint -c .config/yamllint/config
        types: [yaml]
        description: Verify all yaml files syntax
  - repo: https://github.com/maresb/check-json5
    rev: 893a2b5a0a27c3540bd8fcafe2968ccc05237179  # frozen: v1.0.0
    hooks:
      - id: check-json5
        description: Verify all json files syntax using json5 comment support
        exclude: secrets.enc.json
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: aa975a18c9a869648007d33864034dbc7481fe5e  # frozen: v0.42.0
    hooks:
      - id: markdownlint
        description: Verify all markdown files syntax
        entry: "markdownlint --config .config/.markdownlint.json --ignore-path .config/.markdownlintignore"
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: 8991e70b93aea4f86f04ba8fed7c411a51fa09df  # frozen: v8.16.0
    hooks:
      - id: cspell
        args:
          - "--config .config/cspell.json"
  # - repo: https://github.com/codespell-project/codespell
  #   rev: 6e41aba91fb32e9feb741a6258eefeb9c6e4a482  # frozen: v2.2.6
  #   hooks:
  #     - id: codespell
  #       entry: codespell --skip="**/*.sum,**/*.mod,docs/images/**,**/*.enc.*"
  #       description: Simple spell checker
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 38980559e3a605691d6579f96222c30778e5a69e  # frozen: 3.0.0
    hooks:
      - id: shellcheck
        description: Run shellcheck against scripts
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: e5287c0c191ba3f845841baf7e5852b74ab81f8d  # frozen: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
        description: Validate commit message aligns with expected conventions
